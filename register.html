<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="register.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <title>Register - Home</title>
</head>
<body>
  <header>
  </header>

  <main>
      <div class="heroLogin">
        <div class="heroLoginContainer">
          <h2 style="margin-bottom: 20px;">Register</h2>

          <div class="heroLoginInputDiv">

            <div style="display: flex; gap: 10px;">

                <div style="display: flex; flex-direction: column;">
                <h3>First name:</h3>
                <input class="heroLoginInput" type="text" placeholder="John">
                </div>

                <div style="display: flex; flex-direction: column;">
                <h3>Last name:</h3>
                <input class="heroLoginInput" type="text" placeholder="Doe">
                </div>

            </div>
            
            <div>
            <h3>Email:</h3>
            <input class="heroLoginInput" type="text" placeholder="johndoe@gmail.com">
            </div>
           
            <div>
            <h3>Password:</h3>
            <input class="heroLoginInput" type="text" placeholder="********">
            </div>

            <div>
            <h3>Confirm Password:</h3>
            <input class="heroLoginInput" type="text" placeholder="********">
            </div>            
            

          </div>

          <p class="navBarRegister">Already have an account?
            <a href="login.html" style="color: rgb(54, 189, 252);">Login</a>
          </p>
        </div>
      </div>
  </main>

  <footer>

  </footer>
</body>
</html>
