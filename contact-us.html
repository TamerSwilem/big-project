<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="contact-us.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <title>Contact-us - Home</title>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="navBar">

        <div class=" navBarLeftSec">
          <a href="Homepage.html" style="text-decoration: none;">
            <h1 class="navBarLogo">
              TEAM47<br><span style="color: rgb(208, 145, 245);">SPORTS</span>
            </h1>
          </a>
          <input class="navBarSearch" type="text" placeholder="Search for Articles...">
        </div>

        <div class="navBarRightSec">
          <div class="navBarButtons">
            <a href="">
                <button class="navBarButton" style="color: rgb(208, 145, 245);">
                Contact Us
                </button>
            </a>

            <a href="login.html">
                <button class="navBarButton">
                Login
                </button>
            </a>
          </div>
          <p class="navBarRegister">Don't have an account?
            <a href="register.html" style="color: rgb(54, 189, 252);">Register</a>
          </p>
        </div>

      </div>
    </nav>
  </header>

  <main>
    <section class="contactUsFlex">
        <div>
            <h1 style="font-size: 4.5rem;">
                CONTACT US!
            </h1>
            <p style="margin-left: 10px; font-size: large;">We Would Love To Hear From You.</p>
        </div>




    <div class="heroLogin">
        <div class="heroLoginContainer">
          <h2 style="margin-bottom: 20px;">Contact Us</h2>

          <div class="heroLoginInputDiv">

            <div style="display: flex; gap: 10px;">

                <div style="display: flex; flex-direction: column;">
                <h3>First name:</h3>
                <input class="heroLoginInput" type="text" placeholder="John">
                </div>

                <div style="display: flex; flex-direction: column;">
                <h3>Last name:</h3>
                <input class="heroLoginInput" type="text" placeholder="Doe">
                </div>

            </div>
            
            <div>
            <h3>Email:</h3>
            <input class="heroLoginInput" type="text" placeholder="johndoe@gmail.com">
            </div>
           
            <div>
            <h3>Message:</h3>
            <textarea class="contactMessage" placeholder="Enter your message here..."></textarea>
            </div>           
            

          </div>

        </div>
    </div>




    </section>
  </main>

  <footer>

  </footer>
</body>
</html>
